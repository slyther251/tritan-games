  { name: 'MVP',           min: 40,  color: '#FF4400', icon: '🔥' },
  { name: 'Legend',        min: 60,  color: '#FF44CC', icon: '💎' },
  { name: 'Hall of Famer', min: 100, color: '#FFD700', icon: '🏆' },
];
function getWins()      { return parseInt(localStorage.getItem('brawlWins') || '0'); }
function addWin()       { localStorage.setItem('brawlWins', getWins() + 1); }
function getRank(w)     { let r=RANKS[0]; for(const x of RANKS) if(w>=x.min) r=x; return r; }
function getNextRank(w) { return RANKS.find(r => r.min > w) || null; }

function genTex(scene, key, drawFn) {
  if (scene.textures.exists(key)) scene.textures.remove(key);
  const g = scene.add.graphics();
  drawFn(g);
  g.generateTexture(key, 52, 68);
  g.destroy();
}

// ── GAME SCENE ─────────────────────────────────────────────────────────────
class GameScene extends Phaser.Scene {
  constructor() { super('GameScene'); }

  create() {
    const W = 800, H = 500;
    this.mode = (this.scene.settings.data && this.scene.settings.data.mode) || 'fight';

    // Build player texture from selected skin
    const skinKey = this.registry.get('skinKey') || 'mario';
    const skin = SKINS.find(s => s.key === skinKey) || SKINS[0];
    genTex(this, 'ptex', skin.draw);
    genTex(this, 'etex', drawLuigi);

    // Map background + platforms
    const mapIndex = this.registry.get('mapIndex') || 0;
    this.currentMap = MAPS[mapIndex];
    if (this.currentMap.endless) this.mode = 'practice'; // endless always forces practice
    this.currentMap.drawBG(this, W, H);

    this.platforms = this.physics.add.staticGroup();
    this.currentMap.platforms.forEach(([x,y,w,h]) => this.addPlatform(x, y, w, h, this.currentMap.platColor, this.currentMap.trimColor));

    // Fighters
    this.p1 = this.makeFighter(200, 390, 'ptex');
    this.p2 = this.makeFighter(600, 390, 'etex');
    this.p2.face = -1;
    this.p2.s.setFlipX(true);

    this.physics.add.collider(this.p1.s, this.platforms);
    this.physics.add.collider(this.p2.s, this.platforms);

    // Endless map: lock fighters inside screen so they can never fall off
    if (this.currentMap.endless) {
      this.p1.s.setCollideWorldBounds(true);
      this.p2.s.setCollideWorldBounds(true);
    }

    // Input
    this.cursors  = this.input.keyboard.createCursorKeys();
    this.spaceKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);

    // Bat FX
    this.bat1 = this.add.rectangle(-999,-999,62,12,0xFFD700).setDepth(5).setVisible(false);
    this.bat2 = this.add.rectangle(-999,-999,62,12,0xFFD700).setDepth(5).setVisible(false);

    // Game state
    this.p1lives = 3; this.p2lives = 3;
    this.p1atk = 0;   this.p2atk = 0;
    this.p1inv = 0;   this.p2inv = 0;
    this.p1resp = 0;  this.p2resp = 0;
    this.aiTick = 0;
    this.over = false;

    // UI
    this.ui1 = this.add.text(12, 8, '', {
      fontSize: '22px', color: '#5599FF', stroke: '#000', strokeThickness: 3
    }).setDepth(15);
    this.ui2 = this.add.text(W-12, 8, '', {
      fontSize: '22px', color: '#22CC22', stroke: '#000', strokeThickness: 3
    }).setOrigin(1,0).setDepth(15);
    this.add.text(12,  32, skin.name.toUpperCase(), {
      fontSize: '13px', color: '#5599FF', stroke: '#000', strokeThickness: 2
    }).setDepth(15);
    this.add.text(W-12, 32, 'LUIGI', {
      fontSize: '13px', color: '#22CC22', stroke: '#000', strokeThickness: 2
    }).setOrigin(1,0).setDepth(15);
    this.refreshLives();

    // Practice / Endless banner
    if (this.mode === 'practice') {
      const isEndless = this.currentMap.endless;
      const bannerColor = isEndless ? 0x440088 : 0x1A9900;
      const bannerText  = isEndless ? '♾  ENDLESS — Can\'t fall off! Smash away!' : '🏋  PRACTICE — Luigi won\'t attack!';
      this.add.rectangle(W/2, 16, isEndless ? 370 : 300, 30, bannerColor, 0.9).setDepth(14);
      this.add.text(W/2, 16, bannerText, {
        fontSize: '13px', fontFamily: 'Arial Black', color: '#ffffff'
      }).setOrigin(0.5).setDepth(15);
      this.add.text(W/2, H - 14, 'Press R to reset Luigi', {
        fontSize: '13px', fontFamily: 'Arial', color: '#aaaaaa'
      }).setOrigin(0.5).setDepth(15);
      this.input.keyboard.on('keydown-R', () => this.doRespawn(this.p2, false));

      // Menu button (bottom-right) — leave practice any time
      const menuBtn = this.add.rectangle(W - 62, H - 16, 104, 28, 0xAA1100).setDepth(16)
        .setInteractive({ useHandCursor: true });
      this.add.text(W - 62, H - 16, '☰ MENU (ESC)', {
        fontSize: '13px', fontFamily: 'Arial Black', color: '#ffffff'
      }).setOrigin(0.5).setDepth(17);
      const toMenu = () => this.scene.start('TitleScene');
      menuBtn.on('pointerdown', toMenu);
      this.input.keyboard.on('keydown-ESC', toMenu);
    }

    // FIGHT! / PRACTICE! splash
    const ft = this.add.text(W/2, H/2-20, this.mode === 'practice' ? 'PRACTICE!' : 'FIGHT!', {
      fontSize: '88px', fontFamily: 'Arial Black',
      color: '#FFD700', stroke: '#000', strokeThickness: 9
    }).setOrigin(0.5).setDepth(25);
    this.tweens.add({ targets: ft, scaleX: 2, scaleY: 2, alpha: 0, duration: 900,
      onComplete: () => ft.destroy() });
  }

  addPlatform(x, y, w, h, col, trimCol = 0x3AAA3A) {
    const r = this.add.rectangle(x, y, w, h, col);
    this.physics.add.existing(r, true);
    this.platforms.add(r);
    this.add.rectangle(x, y - h/2 + 4, w, 8, trimCol);
  }

  makeFighter(x, y, tex) {
    const s = this.physics.add.sprite(x, y, tex);
    s.setCollideWorldBounds(false);
    s.setBounce(0.04);
    s.setDragX(360);
    s.setDepth(4);
    const dt = this.add.text(x, y-44, '0%', {
      fontSize: '19px', fontFamily: 'Arial Black',
      color: '#ffffff', stroke: '#000', strokeThickness: 3
    }).setOrigin(0.5).setDepth(8);
    return { s, dt, dmg: 0, face: 1 };
  }

  refreshLives() {
    const dots = n => '● '.repeat(Math.max(0,n)).trim();
    this.ui1.setText('YOU  ' + dots(this.p1lives));
    this.ui2.setText(dots(this.p2lives) + '  CPU');
  }

  swing(atk, def, batFX) {
    batFX.setPosition(atk.s.x + atk.face * 42, atk.s.y - 5);
    batFX.setRotation(atk.face * 0.3);
    batFX.setVisible(true);
    this.time.delayedCall(200, () => batFX.setVisible(false));

    const dx = Math.abs(atk.s.x - def.s.x);
    const dy = Math.abs(atk.s.y - def.s.y);
    if (dx < 90 && dy < 58) {
      const defInv = (def === this.p1) ? this.p1inv : this.p2inv;
      if (defInv > 0) return;

      def.dmg = Math.min(def.dmg + 18, 200);
      def.dt.setText(def.dmg + '%');
      def.dt.setColor(def.dmg > 100 ? '#FF2200' : def.dmg > 50 ? '#FF8800' : '#ffffff');

      const power  = 1 + def.dmg / 72;
      const kbDir  = def.s.x > atk.s.x ? 1 : -1;
      def.s.setVelocity(kbDir * 345 * power, -275 * power);

      if (def === this.p1) this.p1inv = 55; else this.p2inv = 55;
      this.cameras.main.shake(130, 0.009);
      this.hitSound(def.dmg);
    }
  }

  hitSound(dmg) {
    try {
      const ac = new (window.AudioContext || window.webkitAudioContext)();
      const o = ac.createOscillator(), gn = ac.createGain();
      o.connect(gn); gn.connect(ac.destination);
      const f = dmg > 100 ? 160 : dmg > 50 ? 220 : 310;
      o.frequency.setValueAtTime(f * 2.2, ac.currentTime);
      o.frequency.exponentialRampToValueAtTime(f * 0.45, ac.currentTime + 0.13);
      gn.gain.setValueAtTime(0.35, ac.currentTime);
      gn.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.13);
      o.start(); o.stop(ac.currentTime + 0.13);
    } catch(e) {}
  }

  checkFall(f, isP1) {
    if (f.s.y > 570 || f.s.x < -130 || f.s.x > 930) {
      if (this.mode === 'practice') { this.doRespawn(f, isP1); return; }
      if (isP1) this.p1lives--; else this.p2lives--;
      this.refreshLives();
      if ((isP1 ? this.p1lives : this.p2lives) > 0) {
        f.s.setPosition(-400, -300); f.s.setVelocity(0, 0);
        if (isP1) this.p1resp = 85; else this.p2resp = 85;
      }
      if (this.p1lives <= 0 || this.p2lives <= 0) this.endGame();
    }
  }

  doRespawn(f, isP1) {
    f.s.setPosition(isP1 ? 200 : 600, 120);
    f.s.setVelocity(0, 0);
    f.dmg = 0; f.dt.setText('0%').setColor('#ffffff');
    if (isP1) { this.p1inv = 130; this.p1resp = 0; }
    else       { this.p2inv = 130; this.p2resp = 0; }
  }

  runAI() {
    if (this.p2resp > 0 || this.over) return;
    const dx = this.p1.s.x - this.p2.s.x;
    const dy = this.p1.s.y - this.p2.s.y;
    const dist = Math.abs(dx);
    this.aiTick++;

    if (dist > 82) {
      const d = dx > 0 ? 1 : -1;
      this.p2.s.setVelocityX(d * 200);
      this.p2.face = d;
    } else {
      this.p2.s.setVelocityX(this.p2.s.body.velocity.x * 0.7);
    }

    if (this.p2.s.body.blocked.down) {
      if (dy < -95) this.p2.s.setVelocityY(-545);
      else if (this.aiTick % 115 === 0 && dist < 240) this.p2.s.setVelocityY(-545);
    }

    // No attacking in practice mode
    if (this.mode !== 'practice' && dist < 90 && Math.abs(dy) < 62 && this.p2atk <= 0) {
      this.p2.face = dx > 0 ? 1 : -1;
      this.p2atk = 38 + Math.floor(Math.random() * 20);
      this.swing(this.p2, this.p1, this.bat2);
    }
  }

  endGame() {
    if (this.over) return;
    this.over = true;
    const W = 800, H = 500, won = this.p1lives > 0;

    // Count win only in real fight mode
    let rankUp = false, newRank = null;
    if (won && this.mode === 'fight' && !this.currentMap.endless) {
      const prevRank = getRank(getWins());
      addWin();
      newRank = getRank(getWins());
      rankUp = newRank.name !== prevRank.name;
    }

    this.add.rectangle(W/2, H/2, W, H, 0x000000, 0.58).setDepth(20);
    this.add.text(W/2, H/2 - 65, won ? '🏆  YOU WIN!  🏆' : '💀  LUIGI WINS!  💀', {
      fontSize: '52px', fontFamily: 'Arial Black',
      color: won ? '#FFD700' : '#22CC22', stroke: '#000', strokeThickness: 7
    }).setOrigin(0.5).setDepth(21);

    if (won && newRank) {
      // Rank-up splash
      if (rankUp) {
        const flash = this.add.rectangle(W/2, H/2, W, H, 0xFFD700, 0.3).setDepth(22);
        this.tweens.add({ targets: flash, alpha: 0, duration: 600 });
        this.add.text(W/2, H/2 - 10, '⬆  RANK UP!', {
          fontSize: '34px', fontFamily: 'Arial Black', color: '#FFD700', stroke: '#000', strokeThickness: 5
        }).setOrigin(0.5).setDepth(23);
        this.add.text(W/2, H/2 + 28, newRank.icon + '  ' + newRank.name, {
          fontSize: '28px', fontFamily: 'Arial Black', color: newRank.color, stroke: '#000', strokeThickness: 4
        }).setOrigin(0.5).setDepth(23);
      } else {
        const w = getWins(), nx = getNextRank(w);
        this.add.text(W/2, H/2 + 8, newRank.icon + '  ' + newRank.name + '  —  ' + w + ' wins', {
          fontSize: '22px', fontFamily: 'Arial Black', color: newRank.color, stroke: '#000', strokeThickness: 3
        }).setOrigin(0.5).setDepth(21);
        if (nx) this.add.text(W/2, H/2 + 34, w + ' / ' + nx.min + ' to ' + nx.icon + ' ' + nx.name, {
          fontSize: '14px', fontFamily: 'Arial', color: '#aaaaaa'
        }).setOrigin(0.5).setDepth(21);
      }
    } else if (!won) {
      this.add.text(W/2, H/2 + 10, 'Give it another shot!', {
        fontSize: '26px', fontFamily: 'Arial', color: '#ffffff', stroke: '#000', strokeThickness: 3
      }).setOrigin(0.5).setDepth(21);
    }

    const rt = this.add.text(W/2, H/2 + 78, 'SPACE  Play Again    ESC  Title', {
      fontSize: '22px', fontFamily: 'Arial Black', color: '#ffffff', stroke: '#000', strokeThickness: 3
    }).setOrigin(0.5).setDepth(21);
    this.tweens.add({ targets: rt, alpha: 0, duration: 600, yoyo: true, repeat: -1 });
    this.time.delayedCall(600, () => {
      this.input.keyboard.once('keydown-SPACE', () => this.scene.start('GameScene', { mode: this.mode }));
      this.input.keyboard.once('keydown-ESC',   () => this.scene.start('TitleScene'));
    });
  }

  update() {
    if (this.over) return;

    if (this.p1atk > 0) this.p1atk--;
    if (this.p2atk > 0) this.p2atk--;
    if (this.p1inv  > 0) this.p1inv--;
    if (this.p2inv  > 0) this.p2inv--;

    if (this.p1resp > 0) { this.p1resp--; if (!this.p1resp) this.doRespawn(this.p1, true);  }
    if (this.p2resp > 0) { this.p2resp--; if (!this.p2resp) this.doRespawn(this.p2, false); }

    // Player input
    if (!this.p1resp) {
      if (this.cursors.left.isDown)       { this.p1.s.setVelocityX(-245); this.p1.face = -1; }
      else if (this.cursors.right.isDown) { this.p1.s.setVelocityX(245);  this.p1.face =  1; }
      if (this.cursors.up.isDown && this.p1.s.body.blocked.down) this.p1.s.setVelocityY(-555);
      if (Phaser.Input.Keyboard.JustDown(this.spaceKey) && this.p1atk <= 0) {
        this.p1atk = 30;
        this.swing(this.p1, this.p2, this.bat1);
      }
    }

    this.runAI();

    // Sync visuals
    for (const [f, inv] of [[this.p1, this.p1inv], [this.p2, this.p2inv]]) {
      f.dt.setPosition(f.s.x, f.s.y - 46);
      f.s.setAlpha(inv > 0 ? (Math.floor(this.time.now / 75) % 2 === 0 ? 0.25 : 1) : 1);
      f.s.setFlipX(f.face < 0);
    }

    if (!this.p1resp) this.checkFall(this.p1, true);
    if (!this.p2resp) this.checkFall(this.p2, false);
  }
}

// ── CONFIG ─────────────────────────────────────────────────────────────────
const config = {
  type: Phaser.AUTO,
  width: 800, height: 500,
  physics: {
    default: 'arcade',
    arcade: { gravity: { y: 690 }, debug: false }
  },
  scene: [TitleScene, ShopScene, MapSelectScene, GameScene]
};
new Phaser.Game(config);
</script>
</body>
